<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – Noteracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', sans-serif;
      background: #111820;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .box {
      width: 100%;
      max-width: 420px;
      background: #1c2228;
      border: 1px solid #323841;
      border-radius: 16px;
      padding: 40px 36px 36px;
    }
    .box-logo { display: block; text-align: center; margin-bottom: 32px; text-decoration: none; }
    .box-logo img { width: 160px; height: auto; display: inline-block; }
    .box-title { font-size: 22px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; }
    .box-sub { font-size: 14px; color: #9e9e9e; text-align: center; margin-bottom: 28px; }
    .panel { display: none; }
    .panel.active { display: block; }
    .msg {
      font-size: 13px; font-weight: 600;
      padding: 11px 14px; border-radius: 8px; margin-bottom: 18px;
      display: none; line-height: 1.5;
    }
    .msg.show { display: block; }
    .msg-err { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.4); color: #f87171; }
    .msg-ok  { background: rgba(34,197,94,.12);  border: 1px solid rgba(34,197,94,.4);  color: #4ade80; }
    .row { margin-bottom: 18px; }
    .row label { display: block; font-size: 14px; font-weight: 600; color: #c7cdc6; margin-bottom: 7px; }
    .inp-wrap { position: relative; }
    .inp-wrap input {
      width: 100%; padding: 13px 16px;
      background: #252b30; border: 1.5px solid #323841; border-radius: 10px;
      color: #fff; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s;
    }
    .inp-wrap input:focus { border-color: #e6b802; }
    .inp-wrap input::placeholder { color: #616161; }
    .inp-wrap input[type="password"] { padding-right: 44px; }
    .pw-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      color: #616161; line-height: 0; transition: color .2s;
    }
    .pw-btn:hover { color: #e6b802; }
    .pw-btn svg { width: 18px; height: 18px; }
    .opts { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .chk { display: flex; align-items: center; gap: 7px; font-size: 14px; color: #9e9e9e; cursor: pointer; }
    .chk input { accent-color: #e6b802; width: 15px; height: 15px; cursor: pointer; }
    .lnk { font-size: 14px; color: #e6b802; text-decoration: none; }
    .lnk:hover { text-decoration: underline; }
    .btn {
      width: 100%; padding: 14px;
      background: #e6b802; color: #1c2228;
      border: none; border-radius: 22px;
      font-size: 15px; font-weight: 800; font-family: inherit;
      cursor: pointer; transition: opacity .2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(28,34,40,.25); border-top-color: #1c2228;
      border-radius: 50%; animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ft-lnk { text-align: center; margin-top: 22px; font-size: 14px; color: #9e9e9e; }
    .ft-lnk a { color: #e6b802; text-decoration: none; font-weight: 600; }
    .ft-lnk a:hover { text-decoration: underline; }
    /* 2FA */
    .twofa-icon {
      width: 58px; height: 58px;
      background: rgba(230,184,2,.1); border: 2px solid rgba(230,184,2,.5);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; color: #e6b802;
    }
    .twofa-icon svg { width: 26px; height: 26px; stroke: currentColor; }
    .twofa-desc { font-size: 14px; color: #9e9e9e; text-align: center; margin-bottom: 24px; line-height: 1.7; }
    .otp-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .otp-cell {
      width: 46px; height: 54px;
      background: #252b30; border: 1.5px solid #323841; border-radius: 10px;
      color: #fff; font-size: 22px; font-weight: 700; text-align: center;
      font-family: monospace; outline: none; transition: border-color .2s;
    }
    .otp-cell:focus { border-color: #e6b802; }
    .back-btn {
      display: block; text-align: center; margin-top: 18px;
      font-size: 14px; color: #9e9e9e; cursor: pointer;
      background: none; border: none; width: 100%;
    }
    .back-btn:hover { color: #e6b802; }
    .pg-foot { margin-top: 28px; font-size: 12px; color: #475568; text-align: center; }
    @media (max-width: 480px) {
      .box { padding: 32px 20px 28px; }
      .otp-cell { width: 40px; height: 48px; font-size: 18px; }
    }
  </style>
</head>

  <!-- 로그인 패널 -->
  <div class="panel active" id="p-login">
    <div class="box-title">Welcome back</div>
    <div class="box-sub">Sign in to your account</div>

    <div id="msg-err" class="msg msg-err"></div>
    <div id="msg-ok"  class="msg msg-ok"></div>

    <div class="row">
      <label for="f-email">Email</label>
      <div class="inp-wrap">
        <input type="email" id="f-email" placeholder="your@email.com" autocomplete="email" />
      </div>
    </div>

    <div class="row">
      <label for="f-pw">Password</label>
      <div class="inp-wrap">
        <input type="password" id="f-pw" placeholder="Enter your password" autocomplete="current-password" />
        <button type="button" class="pw-btn" onclick="togglePw('f-pw')" tabindex="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="opts">
      <label class="chk"><input type="checkbox" id="f-rem" /> Remember me</label>
      <a href="/forgot-password.html" class="lnk">Forgot password?</a>
    </div>

    <button class="btn" id="btn-login" onclick="doLogin()">Sign In</button>

    <div class="ft-lnk">New to Noteracker? <a href="/join.html">Create free account</a></div>
  </div>

  <!-- 2FA 패널 -->
  <div class="panel" id="p-2fa">
    <div class="twofa-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="11" rx="2"/>
        <path d="M8 11V7a4 4 0 018 0v4"/>
        <circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="box-title">Two-Factor Auth</div>
    <div class="twofa-desc">Enter the 6-digit code from<br>your authenticator app</div>
    <div id="msg-2fa" class="msg msg-err"></div>
    <div class="otp-row">
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
      <input class="otp-cell" maxlength="1" inputmode="numeric" />
    </div>
    <button class="btn" id="btn-2fa" onclick="do2FA()">Verify Code</button>
    <button class="back-btn" onclick="goBack()">← Back to login</button>
  </div>
</div>

<p class="pg-foot">© 2026 Noteracker Korea · 418-38-01542</p>

<script>
'use strict';
var _tok = null, _typ = null;
var cells = document.querySelectorAll('.otp-cell');

/* 이미 로그인 상태면 바로 이동 */
(function() {
  var sid = sessionStorage.getItem('nr_session') || localStorage.getItem('nr_session');
  if (!sid) return;
  fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + sid } })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) { if (d) location.href = d.user_type === 'admin' ? '/dashboard-admin.html' : '/dashboard.html'; })
    .catch(function() {});
})();

/* Enter 키 */
document.getElementById('f-email').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('f-pw').focus(); });
document.getElementById('f-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });

/* OTP 자동이동 */
cells.forEach(function(inp, i) {
  inp.addEventListener('input', function() {
    inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
    if (inp.value && i < cells.length - 1) cells[i + 1].focus();
    var code = Array.from(cells).map(function(c) { return c.value; }).join('');
    if (code.length === 6) do2FA();
  });
  inp.addEventListener('keydown', function(e) { if (e.key === 'Backspace' && !inp.value && i > 0) cells[i - 1].focus(); });
});

function togglePw(id) { var i = document.getElementById(id); i.type = i.type === 'password' ? 'text' : 'password'; }

function showErr(msg, is2fa) {
  var id = is2fa ? 'msg-2fa' : 'msg-err';
  document.getElementById(id).textContent = msg;
  document.getElementById(id).classList.add('show');
  if (!is2fa) document.getElementById('msg-ok').classList.remove('show');
}
function showOk(msg) {
  document.getElementById('msg-ok').textContent = msg;
  document.getElementById('msg-ok').classList.add('show');
  document.getElementById('msg-err').classList.remove('show');
}
function clearMsg() {
  ['msg-err','msg-ok','msg-2fa'].forEach(function(id) { document.getElementById(id).classList.remove('show'); });
}
function busy(id, on, label) {
  var b = document.getElementById(id); b.disabled = on;
  b.innerHTML = on ? '<span class="spin"></span> Please wait…' : label;
}
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  clearMsg();
}
function goBack() {
  _tok = null; _typ = null;
  cells.forEach(function(c) { c.value = ''; });
  showPanel('p-login');
}

function doLogin() {
  var email = document.getElementById('f-email').value.trim();
  var pw    = document.getElementById('f-pw').value;
  clearMsg();
  if (!email) { showErr('Please enter your email address.'); return; }
  if (!pw)    { showErr('Please enter your password.'); return; }
  busy('btn-login', true, 'Sign In');

  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: email, password: pw })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
  .then(function(res) {
    if (!res.ok) { showErr(res.d.error || 'Incorrect email or password.'); return; }
    var d = res.d;
    if (d.requires_2fa) {
      _tok = d.temp_token; _typ = d.user_type;
      showPanel('p-2fa'); cells[0].focus(); return;
    }
    var store = document.getElementById('f-rem').checked ? localStorage : sessionStorage;
    store.setItem('nr_session', d.session_id);
    store.setItem('nr_user_type', d.user_type);
    showOk('Login successful! Redirecting…');
    setTimeout(function() {
      location.href = d.user_type === 'admin' ? '/dashboard-admin.html' : '/dashboard.html';
    }, 600);
  })
  .catch(function() { showErr('Network error. Please try again.'); })
  .finally(function() { busy('btn-login', false, 'Sign In'); });
}

function do2FA() {
  var code = Array.from(cells).map(function(c) { return c.value; }).join('');
  if (code.length !== 6) { showErr('Please enter all 6 digits.', true); return; }
  busy('btn-2fa', true, 'Verify Code');
  fetch('/api/auth/verify-2fa', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ temp_token: _tok, totp_code: code, user_type: _typ })
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, d: d }; }); })
  .then(function(res) {
    if (!res.ok) {
      showErr(res.d.error || 'Invalid code.', true);
      cells.forEach(function(c) { c.value = ''; }); cells[0].focus(); return;
    }
    var store = sessionStorage;
    store.setItem('nr_session', res.d.session_id);
    store.setItem('nr_user_type', res.d.user_type);
    location.href = res.d.user_type === 'admin' ? '/dashboard-admin.html' : '/dashboard.html';
  })
  .catch(function() { showErr('Network error.', true); })
  .finally(function() { busy('btn-2fa', false, 'Verify Code'); });
}
</script>
